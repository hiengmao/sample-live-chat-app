name: Node CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
        
      - name: Run format check
        run: npm run format

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
      
      - name: Build project
        run: npm run build

      - name: Build Docker image
        run: docker build -t my-chat-app .